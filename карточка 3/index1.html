<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1 - Вариант 16 (Шаблон главной страницы)</title>
    <!-- Подключаем внешний файл стилей CSS -->
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <!-- Основной контейнер-сетка -->
    <div class="container">
        
        <!-- Блок 1: Шапка, Панель навигации -->
        <nav class="grid-block block-1">
            <h2>Шапка, Навигация (Блок 1)</h2>
        </nav>

        <!-- Блок 2: Раздел  -->
        <section class="grid-block block-2">
            <h2>Раздел (Блок 2)</h2>
        </section>

        <!-- Блок 3: Основное содержимое страницы -->
        <main class="grid-block block-3">
            <h2>Главный контент (Блок 3)</h2>
        </main>

        <!-- Блок 4: панель -->
        <aside class="grid-block block-4">
            <h2>Боковая панель (Блок 4)</h2>
        </aside>

        <!-- Блок 5: Подвал страницы, растянут на всю ширину сетки -->
        <footer class="grid-block block-5">
            <h2>Подвал (Блок 5)</h2>
        </footer>

    </div>

</body>
</html>
