<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 2 - Вариант 16 (Форма Авторизации)</title>
    <!-- Подключаем внешний файл стилей для второго задания -->
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- Основной контейнер-сетка -->
    <div class="container">
        
        <!-- БЛОК 1: Шапка, Панель навигации -->
        <nav class="grid-block block-1">
            <h2>Блок 1</h2>
        </nav>

        <!-- БЛОК 2: Раздел с произвольным текстом -->
        <section class="grid-block block-2">
            <h2>Блок 2</h2>
            <p>Произвольный текст бла-бла бла-бла бла-бла Пац Маргарита ПЗТ-42.</p>
        </section>

        <!-- БЛОК 3: Главный контент с изображением -->
        <main class="grid-block block-3">
            <h2>Блок 3</h2>
            <img src="photo.png" alt="Изображение макета" class="content-img">
        </main>

        <!-- БЛОК 4: Боковая панель  -->
        <aside class="grid-block block-4">
            <h2>Блок 4</h2>
        </aside>

        <!-- БЛОК 5: Подвал -->
        <footer class="grid-block block-5">
            
            <!-- Карточка формы авторизации (серый прямоугольник) -->
            <div class="auth-card">
                <!-- Заголовок формы -->
                <h3 class="auth-title">Авторизация</h3>
                
                <!-- Сама форма -->
                <form class="auth-form">
                    <!-- Поле ввода: Имя пользователя -->
                    <div class="form-field">
                        <input type="text" placeholder="Имя пользователя">
                    </div>
                    
                    <!-- Поле ввода: Пароль (тип password скрывает вводимые символы) -->
                    <div class="form-field">
                        <input type="password" placeholder="Пароль">
                    </div>
                    
                    <!-- Чекбокс "Запомнить меня" -->
                    <div class="form-checkbox">
                        <label>
                            <input type="checkbox"> Запомнить меня
                        </label>
                    </div>
                    
                    <!-- Контейнер с двумя кнопками: Войти и Отмена -->
                    <div class="form-actions">
                        <button type="submit" class="auth-btn">Войти</button>
                        <button type="button" class="auth-btn">Отмена</button>
                    </div>
                    
                    <!-- Блок со ссылками: Забыли пароль? и Регистрация -->
                    <div class="form-links">
                        <a href="#">Забыли пароль?</a>
                        <a href="#">Регистрация</a>
                    </div>
                </form>
            </div>

        </footer>

    </div>

</body>
</html>
