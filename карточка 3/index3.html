<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 3 - Вариант 16 (Адаптивный макет)</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <div class="container">
        
        <nav class="grid-block block-1">
            <h2>Блок 1</h2>
        </nav>

        <section class="grid-block block-2">
            <h2>Блок 2</h2>
            <p> Произвольный текст бла-бла бла-бла бла-бла Пац Маргарита ПЗТ-42.</p>
        </section>

        <main class="grid-block block-3">
            <h2>Блок 3</h2>
            <img src="photo.png" alt="Изображение макета" class="content-img">
        </main>

        <aside class="grid-block block-4">
            <h2>Блок 4</h2>
        </aside>

        <footer class="grid-block block-5">
            
            <div class="auth-card">
                <h3 class="auth-title">Авторизация</h3>
                
                <form class="auth-form">
                    <div class="form-field">
                        <input type="text" placeholder="Имя пользователя">
                    </div>
                    
                    <div class="form-field">
                        <input type="password" placeholder="Пароль">
                    </div>
                    
                    <div class="form-checkbox">
                        <label>
                            <input type="checkbox"> Запомнить меня
                        </label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="auth-btn">Войти</button>
                        <button type="button" class="auth-btn">Отмена</button>
                    </div>
                    
                    <div class="form-links">
                        <a href="#">Забыли пароль?</a>
                        <a href="#">Регистрация</a>
                    </div>
                </form>
            </div>

        </footer>

    </div>

</body>
</html>
